# fly.toml app configuration file generated for comp34-api on 2026-03-21T01:52:19-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'comp34-api'
primary_region = 'yyz'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
[mounts]
  source="data"
  destination="/data"
